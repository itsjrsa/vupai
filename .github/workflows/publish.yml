name: Publish to PyPI

# Publishes when a GitHub Release is published (the single ship action: it carries
# the release notes AND drives the PyPI upload). Triggering on the release only
# (not also on the tag push) avoids a duplicate run. The release's tag must match
# v* (the pypi environment's deployment policy) and the publish waits for manual
# approval. Uses PyPI Trusted Publishing (OIDC) - no API tokens stored in the repo.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
